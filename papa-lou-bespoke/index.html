<script>
(function(){
  var esc=function(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');};
  function render(t,c){
    for(var pass=0;pass<6;pass++){var before=t;
      t=t.replace(/\{\{#(\w+)\}\}([\s\S]*?)\{\{\/\1\}\}/g,function(_,k,inner){
        var v=c[k];
        if(Array.isArray(v))return v.map(function(it){return inner.replace(/\{\{\.\}\}/g,esc(it));}).join('');
        return v?inner:'';
      });
      if(t===before)break;
    }
    t=t.replace(/\{\{(\w+)\}\}/g,function(_,k){return c[k]==null?'':esc(c[k]);});
    t=t.replace(/\{\{[#/]?\.?\w*\}\}/g,'');
    return t;
  }
  function once(str,marker,val){var first=true;return str.split(marker).map(function(seg,i){return i===0?seg:(first?(first=false,val):'')+seg;}).join('');}
  fetch('data.json',{cache:'no-store'}).then(function(r){return r.json();}).then(function(d){
    var wa=(d.whatsapp||'').replace(/\D/g,''),tel=(d.phone||'').replace(/[^\d+]/g,'');
    var waOK=d.whatsapp_verified===true&&wa.length>=8;
    var c=Object.assign({},d,{
      phone:tel, whatsapp_href:waOK?('https://wa.me/'+wa):'', whatsapp_ok:waOK,
      primary_cta_label:waOK?(d.primary_cta||'Message on WhatsApp'):('Call '+(d.phone_display||'')).trim(),
      primary_cta_href:waOK?('https://wa.me/'+wa):('tel:'+tel)
    });
    var html=render(atob(TPL).replace(/[\u00C0-\u024F\u1E00-\u1EFF]/g,function(m){return m;}),c);
    // markers de contenido real
    html=once(html,'<!--HERO_IMG-->', d.hero?'<img class="hero-img" src="'+esc(d.hero)+'" alt="'+esc(d.business)+' work">':'');
    html=once(html,'<!--GALLERY-->', (d.gallery||[]).map(function(s){return '<img class="gphoto" src="'+esc(s)+'" alt="'+esc(d.business)+' detailing work" loading="lazy">';}).join(''));
    var revHtml=(d.reviews||[]).map(function(r){return '<article class="rev"><div class="rev-top"><span class="rev-name">'+esc(r.name)+'</span><span class="rev-stars">'+esc(r.stars)+'</span></div><p class="rev-text">'+esc(r.text)+'</p></article>';}).join('')+(d.reviews_agg?'<p class="rev-agg">'+esc(d.reviews_agg)+'</p>':'');

    html=html.replace(/(<a\b[^>]*href="tel:[^"]*"[^>]*>)([\s\S]*?)(<\/a>)/gi,function(m,o,inner,cl){var vis=inner.replace(/<[^>]*>/g,'').replace(/&[a-z]+;/gi,'').trim();return vis?m:o+'Call'+cl;});
    document.open();document.write(html);document.close();
  }).catch(function(e){document.body.innerHTML='<p style="font-family:sans-serif;padding:40px">Loading…</p>';});
})();</script>
